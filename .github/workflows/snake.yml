name: 🐍 Snake Animation

on:
  schedule:
    # Runs every 6 hours — keeps your snake up to date
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake animation (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github
            dist/github-snake-dark.svg?palette=github-dark&color_snake=38bdf8&color_dots=#050d1a,#0a1f3f,#1e3a5f,#2563eb,#38bdf8

      - name: Push output to `output` branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
